# Builds the Distractor sites whose data sources need open egress
# (SMK, NASA, Wellcome), commits the built shards back to each site
# branch, and deploys each site to its gh-pages subfolder.
#
# Run it from the Actions tab (workflow_dispatch) or let the monthly
# schedule refresh the datasets.

name: Build Distractors

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 * *'

permissions:
  contents: write

concurrency:
  group: build-distractors
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1   # jobs push to gh-pages; keep them serial
      fail-fast: false
      matrix:
        site: [smk, nasa, wellcome, staedel, finna, smb]
    steps:
      - name: Check out site branch
        uses: actions/checkout@v4
        with:
          ref: distractor/${{ matrix.site }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build dataset
        run: |
          npm ci
          node build.mjs
          test -s public/data/meta.json

      - name: Commit shards to the site branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/data
          git commit -m "Refresh ${{ matrix.site }} dataset" || echo "No changes"
          git push origin HEAD:distractor/${{ matrix.site }}

      - name: Deploy to gh-pages/${{ matrix.site }}
        run: |
          git fetch --depth 1 origin gh-pages
          git worktree add ../pages origin/gh-pages
          rm -rf "../pages/${{ matrix.site }}"
          mkdir -p "../pages/${{ matrix.site }}"
          cp -r public/. "../pages/${{ matrix.site }}/"
          cd ../pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ matrix.site }}"
          git commit -m "Deploy /${{ matrix.site }}/ from distractor/${{ matrix.site }}" || echo "No changes"
          git push origin HEAD:gh-pages
