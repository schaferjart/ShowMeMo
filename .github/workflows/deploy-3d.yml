# Deploys the 3D site (Smithsonian Open Access 3D objects) into gh-pages/3d/.
#
# 3D is its own branch and its own medium — it ships model-viewer for rotatable
# objects, not the shared flat-image app — so it deploys itself here rather than
# through the fleet matrix. One deploy target per workflow file; shares the
# `pages` concurrency group with root, /hpbda/, and the fleet so gh-pages
# pushes never race.

name: Deploy 3D

on:
  push:
    branches: [3D]
    paths:
      - 'public/**'
      - 'build.mjs'
      - '.github/workflows/deploy-3d.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 * *'   # monthly: refresh the dataset

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 3D
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Build the dataset
        run: |
          npm ci
          node build.mjs
          test -s public/data/meta.json
      - name: Deploy to gh-pages/3d
        run: |
          git fetch --depth 1 origin gh-pages
          git worktree add ../pages origin/gh-pages
          rm -rf ../pages/3d
          mkdir -p ../pages/3d
          cp -r public/. ../pages/3d/
          cd ../pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 3d
          git commit -m "Deploy /3d/ from 3D ($GITHUB_SHA)" || echo "No changes"
          git push origin HEAD:gh-pages
