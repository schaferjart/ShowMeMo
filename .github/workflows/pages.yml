name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/distractor-moma-site-au9j42
  # Re-run manually any time to refresh the dataset.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      # Publish public/ as a single orphan commit on gh-pages. Creating the
      # gh-pages branch auto-enables Pages, and the orphan commit keeps the
      # ~36 MB dataset from accumulating history.
      - name: Publish to gh-pages
        run: |
          cd public
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy site from $GITHUB_SHA"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
