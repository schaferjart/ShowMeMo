# Deploys the ROOT site (Distractor: MoMA) to gh-pages.
#
# One deploy target per workflow FILE. Every Distractor branch writes into the
# same gh-pages tree, so a branch that needs its own deploy gets its own
# filename (deploy-hpbda.yml, ...) — never a second copy of this one. Sharing
# the filename is what let hpbda's deploy overwrite this workflow's trigger
# when it merged, silently leaving the root site with nothing to publish it.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Re-run manually any time to refresh the dataset.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      # Publish public/ as the ROOT of gh-pages while preserving the
      # Distractor fleet's subfolders (/museum/, /cleveland/, /3d/, ...),
      # which are deployed there by their own branches and workflows.
      - name: Publish to gh-pages
        run: |
          git fetch --depth 1 origin gh-pages
          git worktree add ../pages origin/gh-pages
          cd ../pages
          # NB: .git is a *file* in a linked worktree — deleting it breaks git
          find . -maxdepth 1 -type f ! -name '.git' ! -name '.nojekyll' ! -name '.gitignore' -delete
          rm -rf data
          cp -r "$GITHUB_WORKSPACE/public/." .
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy site from $GITHUB_SHA" || echo "No changes"
          git push origin HEAD:gh-pages
