name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/distractor-moma-site-au9j42
  # Re-run manually any time to refresh the dataset.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      # Publish public/ as a single orphan commit on gh-pages. Creating the
      # gh-pages branch auto-enables Pages, and the orphan commit keeps the
      # ~36 MB dataset from accumulating history.
      # Publish public/ as the ROOT of gh-pages while preserving the
      # Distractor fleet's subfolders (/museum/, /cleveland/, /3d/, ...),
      # which are deployed there by their own branches and workflows.
      - name: Publish to gh-pages
        run: |
          git fetch --depth 1 origin gh-pages
          git worktree add ../pages origin/gh-pages
          cd ../pages
          find . -maxdepth 1 -type f ! -name '.nojekyll' ! -name '.gitignore' -delete
          rm -rf data
          cp -r "$GITHUB_WORKSPACE/public/." .
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy site from $GITHUB_SHA" || echo "No changes"
          git push origin HEAD:gh-pages
