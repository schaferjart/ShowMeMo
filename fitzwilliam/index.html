<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Distractor: Cambridge</title>
<meta name="description" content="One random work from the Fitzwilliam Museum, Cambridge.">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <img id="artwork" alt="" decoding="async">
</main>

<div class="controls">
  <button id="refresh" type="button" aria-label="Show another work" title="Another work (R)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M20 12a8 8 0 1 1-2.34-5.66"/>
      <path d="M20 4v5h-5"/>
    </svg>
  </button>
  <button id="toggle-caption" type="button" aria-label="Toggle caption" aria-expanded="false" title="Caption (I)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>
</div>

<aside id="caption" hidden>
  <p id="cap-title"></p>
  <p id="cap-artist"></p>
  <p id="cap-date"></p>
  <p id="cap-medium"></p>
  <p id="cap-credit"></p>
  <p><a id="cap-link" href="" target="_blank" rel="noopener">View at the Fitzwilliam</a></p>
</aside>

<footer>A random work from the Fitzwilliam Museum // J. A. Schafer 2026</footer>

<noscript><p class="noscript">This page needs JavaScript to pick a random artwork.</p></noscript>

<script src="app.js"></script>
</body>
</html>
